<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabinet Studio</title>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="lib/jszip.min.js"></script>
  <style>
    :root {
      --font-heading: "Outfit", "Segoe UI", sans-serif;
      --font-body: "Manrope", "Segoe UI", sans-serif;
      --bg: #eef5ff;
      --bg-soft: #f7faff;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-strong: #ffffff;
      --line: rgba(46, 82, 148, 0.1);
      --line-strong: rgba(46, 82, 148, 0.18);
      --text: #17233a;
      --muted: #6b7a96;
      --accent: #3c61ff;
      --accent-deep: #1b2f78;
      --accent-soft: #dfe8ff;
      --teal: #5c86d6;
      --gold: #efb450;
      --shadow: 0 12px 24px rgba(92, 126, 181, 0.08);
      --radius-xl: 18px;
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(111, 163, 255, 0.24), transparent 26%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.86), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, #eaf2ff 54%, #f3f7ff 100%);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 360px;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      height: 100vh;
      padding: 10px;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 8px 12px;
      border: 1px solid rgba(61, 95, 171, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 6px 16px rgba(97, 130, 186, 0.08);
      backdrop-filter: blur(12px);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo-slot {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #eef4ff);
      border: 1px solid rgba(61, 95, 171, 0.12);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: none;
    }

    .brand-logo-slot img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .brand-copy {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .company-name,
    .product-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .company-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .product-name {
      font-size: 12px;
      color: var(--muted);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .topbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid rgba(61, 95, 171, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .topbar-btn:hover {
      background: #ffffff;
      border-color: rgba(61, 95, 171, 0.22);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(97, 130, 186, 0.08);
    }

    .topbar-btn i {
      font-size: 11px;
      color: var(--muted);
    }

    .sidebar-shell,
    #viewport-panel,
    #panel-info {
      min-height: 0;
      border: 1px solid rgba(61, 95, 171, 0.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar-shell {
      display: flex;
      flex-direction: column;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98));
    }

    .sidebar-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52), transparent 22%),
        radial-gradient(circle at 100% 0%, rgba(111, 163, 255, 0.1), transparent 34%);
      pointer-events: none;
    }

    .sidebar-header {
      position: relative;
      z-index: 1;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(61, 95, 171, 0.08);
    }

    .sidebar-header-row,
    .viewport-project-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header h1 {
      font-family: var(--font-heading);
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .sidebar-header-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .viewport-project-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 0;
    }

    .project-tabs-rail {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .project-tabs {
      display: flex;
      align-items: flex-end;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      width: max-content;
      min-width: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .project-tabs::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .project-tabs::-webkit-scrollbar-thumb {
      background: rgba(61, 95, 171, 0.18);
      border-radius: 999px;
    }

    .project-tabs.compact .project-tab {
      min-width: 132px;
      max-width: 168px;
    }

    .project-tabs.compact .project-tab-select {
      padding: 9px 11px 8px;
    }

    .project-tabs.compact .project-tab-name,
    .project-tabs.compact .project-tab-rename {
      font-size: 11px;
    }

    .project-tabs.ultra-compact .project-tab {
      min-width: 112px;
      max-width: 132px;
    }

    .project-tabs.ultra-compact .project-tab-select {
      padding: 8px 10px 7px;
    }

    .project-tabs.ultra-compact .project-tab-name,
    .project-tabs.ultra-compact .project-tab-rename {
      font-size: 10px;
    }

    .project-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 160px;
      max-width: 220px;
      padding: 0;
      border-radius: 8px 8px 0 0;
      border: 0;
      border-bottom: 1px solid rgba(61, 95, 171, 0.12);
      background: transparent;
      transition: color 0.18s ease;
    }

    .project-tab.active {
      background: rgba(255, 255, 255, 0.99);
      border-top: 1px solid rgba(61, 95, 171, 0.18);
      border-left: 1px solid rgba(61, 95, 171, 0.18);
      border-right: 1px solid rgba(61, 95, 171, 0.18);
      border-color: rgba(61, 95, 171, 0.18);
      border-bottom-color: transparent;
      margin-bottom: -1px;
      position: relative;
      z-index: 2;
    }

    .project-tab-select {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      padding: 10px 14px 9px;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      border-radius: 8px 8px 0 0;
    }

    .project-tab:not(.active) .project-tab-select {
      border-bottom: 1px solid rgba(61, 95, 171, 0.12);
    }

    .project-tab-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .project-tab.active .project-tab-name {
      color: var(--text);
    }

    .project-tab-rename {
      width: 100%;
      min-width: 0;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      color: inherit;
    }

    .project-tab-rename::selection {
      background: rgba(61, 97, 255, 0.22);
    }

    .project-tab-add {
      display: inline-grid;
      place-items: center;
      width: 34px;
      min-width: 34px;
      height: 34px;
      align-self: flex-end;
      border-radius: 8px 8px 0 0;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-bottom: 1px solid rgba(61, 95, 171, 0.12);
      cursor: pointer;
      transition: color 0.18s ease;
    }

    .project-tab-add:hover {
      color: var(--text);
    }

    .project-tab-add i {
      font-size: 13px;
    }

    .project-tabs-side {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex: 0 0 auto;
      align-self: center;
    }

    .project-context-menu {
      position: fixed;
      z-index: 40;
      min-width: 168px;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid rgba(61, 95, 171, 0.12);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 18px 32px rgba(53, 82, 128, 0.18);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .project-context-menu.hidden {
      display: none;
    }

    .project-context-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      justify-content: flex-start;
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .project-context-btn:hover:not(:disabled) {
      background: rgba(225, 235, 255, 0.72);
    }

    .project-context-btn i {
      font-size: 11px;
      color: var(--muted);
    }

    .project-context-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #form-container {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
    }

    #form-container::-webkit-scrollbar,
    #panel-info::-webkit-scrollbar { width: 8px; }

    #form-container::-webkit-scrollbar-thumb,
    #panel-info::-webkit-scrollbar-thumb {
      background: rgba(110, 84, 58, 0.24);
      border-radius: 999px;
    }

    .cabinet-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-section {
      padding: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(61, 95, 171, 0.08);
      box-shadow: none;
    }

    .form-section-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .form-section-icon {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: linear-gradient(180deg, rgba(92, 134, 255, 0.16), rgba(92, 134, 255, 0.06));
      color: #3558cb;
      border: 1px solid rgba(92, 134, 255, 0.14);
      flex: 0 0 auto;
    }

    .form-section-icon i {
      font-size: 10px;
      line-height: 1;
    }

    .cabinet-form h3 {
      font-family: var(--font-body);
      margin-bottom: 0;
      font-size: 10px;
      font-weight: 800;
      color: #4b6db7;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .field {
      display: grid;
      grid-template-columns: minmax(94px, 0.78fr) minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      padding: 3px 0;
    }

    .field + .field {
      border-top: 1px solid rgba(61, 95, 171, 0.06);
    }

    .section-blurb {
      margin: 0 0 8px;
      font-size: 11px;
      line-height: 1.45;
      color: var(--muted);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      width: 100%;
      min-width: 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(61, 95, 171, 0.08);
      background: rgba(248, 251, 255, 0.96);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .mode-card:hover,
    .mode-card:focus-visible {
      border-color: rgba(61, 95, 171, 0.2);
      box-shadow: none;
      transform: none;
      outline: none;
    }

    .mode-card.active {
      background:
        linear-gradient(180deg, rgba(60, 97, 255, 0.12), rgba(248, 251, 255, 0.98));
      border-color: rgba(61, 95, 171, 0.28);
      box-shadow: none;
    }

    .mode-card-head {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--teal);
    }

    .mode-card-copy {
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted);
    }

    .helper-card {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 4px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(224, 235, 255, 0.72);
      border: 1px solid rgba(92, 134, 255, 0.12);
      color: var(--text);
      font-size: 11px;
      line-height: 1.4;
    }

    .helper-card strong {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .field label {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
    }

    .field .input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

    .field input[type="number"],
    .field select {
      width: 100%;
      min-width: 0;
      padding: 7px 9px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(61, 95, 171, 0.1);
      border-radius: 8px;
      box-shadow: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .field input[type="number"]:focus,
    .field select:focus {
      outline: none;
      border-color: rgba(61, 95, 171, 0.36);
      box-shadow: 0 0 0 3px rgba(61, 95, 171, 0.08);
      transform: none;
    }

    .field input[type="checkbox"] {
      width: 16px;
      height: 16px;
      justify-self: start;
      accent-color: var(--accent);
    }

    .field .unit {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .drawer-heights {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .drawer-height-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
    }

    .drawer-height-row span {
      font-size: 11px;
      color: var(--muted);
    }

    .drawer-summary-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .drawer-summary {
      font-size: 11px;
      font-family: monospace;
    }
    .drawer-remaining {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
    }
    .drawer-auto-btn {
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      background: #16255d;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .drawer-auto-btn:hover { background: #23377d; }

    .material-preset { width: 100%; }

    .validation-msgs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .warn {
      font-size: 11px;
      line-height: 1.4;
      color: #8b4d15;
      padding: 7px 9px;
      background: #f9efda;
      border: 1px solid rgba(200, 154, 67, 0.26);
      border-radius: 8px;
    }

    #viewport-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(242, 247, 255, 0.98));
    }

    .viewport-stage {
      flex: 1;
      min-height: 0;
      padding: 0;
    }

    .viewport-top-tools {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #viewport-container {
      position: relative;
      height: 100%;
      min-height: 0;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      border: 0;
      background:
        radial-gradient(circle at top left, rgba(108, 154, 255, 0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(79, 106, 255, 0.08), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      box-shadow: none;
    }

    .viewport-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border: 1px solid rgba(61, 95, 171, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(97, 130, 186, 0.08);
      cursor: pointer;
      user-select: none;
    }

    .viewport-copies {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(61, 95, 171, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(97, 130, 186, 0.08);
    }

    .viewport-copies input {
      width: 46px;
      min-width: 46px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(61, 95, 171, 0.14);
      background: rgba(247, 250, 255, 0.96);
      color: var(--text);
      font: inherit;
      text-align: center;
    }

    .viewport-toggle input {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #viewport-container::after {
      content: "Click doors and drawers to preview movement";
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(61, 95, 171, 0.08);
      color: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }

    #viewport-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #panel-info {
      overflow-y: auto;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98));
    }

    .panel-info-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .panel-info-head h3 {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-body);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #4b6db7;
    }

    .panel-info-head span {
      font-size: 11px;
      color: var(--muted);
    }

    .panel-info-head h3 i {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: rgba(92, 134, 255, 0.12);
      color: #3d5ffc;
      border: 1px solid rgba(92, 134, 255, 0.14);
      font-size: 10px;
      letter-spacing: 0;
    }

    #panel-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .results-tabs {
      margin-bottom: 8px;
    }

    .panel-info-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 8px;
      align-items: stretch;
      position: relative;
      font-size: 11px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(61, 95, 171, 0.08);
      box-shadow: none;
    }

    .panel-info-row:hover,
    .panel-info-row:focus-within {
      background: rgba(255, 255, 255, 0.96);
      border-color: rgba(61, 95, 171, 0.18);
    }

    .panel-row-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 4px;
    }

    .panel-row-actions {
      margin-top: auto;
      padding-top: 6px;
    }

    .panel-row-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      border-radius: 8px;
      border: 1px solid rgba(61, 95, 171, 0.08);
      background: #f4f8ff;
      overflow: hidden;
      padding: 5px;
    }

    .panel-row-preview svg {
      display: block;
      width: 100%;
      height: auto;
      max-height: 92px;
    }

    .export-row-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px; font-size: 10px; font-weight: 700;
      background: #16255d; color: #fff; border: none; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
    }
    .export-row-btn:hover { background: #23377d; }

    .panel-name {
      color: var(--text);
      font-weight: 700;
    }

    .panel-dims {
      color: #4160d8;
      font-family: "Consolas", "SFMono-Regular", monospace;
      font-weight: 700;
    }

    .panel-meta {
      color: var(--muted);
      line-height: 1.35;
    }

    .panel-info-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
      padding: 16px 0;
    }

    #panel-list-view,
    #nesting-view {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nesting-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .nesting-metric {
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(61, 95, 171, 0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nesting-metric span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .nesting-metric strong {
      font-size: 18px;
      color: var(--text);
    }

    .nesting-controls-card {
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(61, 95, 171, 0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nesting-controls-head h4 {
      font-size: 13px;
      color: var(--text);
    }

    .nesting-controls-head p {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted);
    }

    .nesting-controls-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .nesting-stock-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nesting-stock-field span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
    }

    .nesting-stock-field select {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(61, 95, 171, 0.12);
      border-radius: 8px;
    }

    .nesting-inline-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nesting-inline-input input {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(61, 95, 171, 0.12);
      border-radius: 8px;
    }

    .nesting-inline-input em {
      font-style: normal;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .nesting-check-field {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid rgba(61, 95, 171, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
    }

    .nesting-check-field input {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
    }

    .nesting-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nesting-group-head h4 {
      font-size: 13px;
      color: var(--text);
    }

    .nesting-group-head p {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .nesting-sheet-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nesting-sheet-card {
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(61, 95, 171, 0.08);
    }

    .nesting-sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .nesting-sheet-head h5 {
      font-size: 12px;
      color: var(--text);
    }

    .nesting-sheet-head p {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .nesting-badge {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(223, 232, 255, 0.92);
      border: 1px solid rgba(92, 134, 255, 0.18);
      color: #3457cb;
      font-size: 11px;
      font-weight: 800;
    }

    .nesting-sheet-canvas {
      border-radius: 14px;
      border: 1px solid rgba(61, 95, 171, 0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(239, 245, 255, 0.96));
      padding: 8px;
      overflow: hidden;
      width: 100%;
      text-align: left;
      cursor: zoom-in;
    }

    .nesting-sheet-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(11, 20, 41, 0.56);
      backdrop-filter: blur(6px);
    }

    .modal-card {
      width: min(1200px, 100%);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(61, 95, 171, 0.12);
      box-shadow: 0 24px 60px rgba(15, 29, 59, 0.26);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(61, 95, 171, 0.08);
    }

    .modal-head h4 {
      font-size: 16px;
      color: var(--text);
    }

    .modal-head p {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .modal-close {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(61, 95, 171, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      cursor: pointer;
    }

    .modal-body {
      overflow: auto;
      padding: 16px;
      background: linear-gradient(180deg, rgba(248, 251, 255, 0.94), rgba(239, 245, 255, 0.94));
    }

    .modal-body .nesting-sheet-svg {
      min-width: 900px;
    }

    .hidden { display: none !important; }

    .tab-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 8px;
      min-height: 34px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(248, 251, 255, 0.94);
      color: var(--muted);
      border: 1px solid rgba(61, 95, 171, 0.08);
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .tab.active {
      background: linear-gradient(180deg, rgba(22, 37, 93, 0.98), rgba(34, 55, 125, 0.98));
      color: #fff;
      border-color: rgba(27, 47, 120, 0.72);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08), 0 8px 16px rgba(61, 95, 171, 0.16);
    }

    .tab i,
    .drawer-auto-btn i,
    .export-row-btn i {
      font-size: 0.92em;
      line-height: 1;
    }

    .tab-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tab-container { display: contents; }

    @media (max-width: 1180px) {
      #app {
        grid-template-columns: 290px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }

      #panel-info {
        grid-column: 1 / -1;
      }

      .panel-info-row {
        grid-template-columns: minmax(0, 1fr) 160px;
      }

      .panel-row-preview {
        min-height: 120px;
      }
    }

    @media (max-width: 900px) {
      body { overflow: auto; }

      #app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        gap: 10px;
        padding: 10px;
      }

      .sidebar-shell,
      #panel-info,
      #viewport-panel {
        min-height: auto;
        border-radius: 14px;
      }

      #form-container {
        max-height: none;
      }

      #viewport-panel {
        grid-template-rows: 420px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 8px 10px;
      }

      .topbar-actions {
        width: 100%;
      }

      .sidebar-header,
      #form-container,
      #panel-info,
      .viewport-stage {
        padding-left: 10px;
        padding-right: 10px;
      }

      .field {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .panel-info-row {
        grid-template-columns: 1fr;
      }

      #viewport-panel {
        grid-template-rows: 320px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="brand-logo-slot" aria-hidden="true">
          <img src="assets/logo.svg" alt="">
        </div>
        <div class="brand-copy">
          <span class="company-name">Cabinet</span>
          <span class="product-name">Studio</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" type="button" id="import-btn">
          <i class="fa-solid fa-file-import"></i>
          <span>Import</span>
        </button>
        <button class="topbar-btn" type="button" id="save-project-btn">
          <i class="fa-solid fa-floppy-disk"></i>
          <span>Save Project</span>
        </button>
        <button class="topbar-btn" type="button" id="open-layout-btn">
          <i class="fa-solid fa-ruler-combined"></i>
          <span>Kitchen Layout</span>
        </button>
        <button class="topbar-btn" type="button" id="export-zip-btn">
          <i class="fa-solid fa-file-export"></i>
          <span>Manufacturing ZIP</span>
        </button>
      </div>
    </div>
    <aside class="sidebar-shell">
      <div class="sidebar-header">
        <div class="sidebar-header-row">
          <h1>Cabinet Settings</h1>
        </div>
      </div>
      <div id="form-container"></div>
    </aside>
    <div id="viewport-panel">
      <div class="viewport-project-shell">
        <div class="project-tabs-rail">
          <div class="project-tabs" id="project-cabinet-tabs"></div>
        </div>
        <div class="project-tabs-side">
          <button class="project-tab-add" type="button" id="project-add-cabinet-btn" aria-label="Add cabinet">
            <i class="fa-solid fa-plus" aria-hidden="true"></i>
          </button>
          <span class="sidebar-header-meta" id="project-cabinet-meta">1 cabinet in project</span>
        </div>
      </div>
      <div class="viewport-stage">
        <div id="viewport-container">
          <div class="viewport-top-tools">
            <label class="viewport-copies" for="project-copies-input">
              <span>Copies</span>
              <input id="project-copies-input" type="number" min="1" step="1" value="1">
            </label>
            <label class="viewport-toggle" for="show-edges-toggle">
              <input id="show-edges-toggle" type="checkbox" checked>
              <span>Show Edges</span>
            </label>
          </div>
        </div>
      </div>
    </div>
    <aside id="panel-info">
      <div class="panel-info-head">
        <h3><i class="fa-solid fa-table-cells" aria-hidden="true"></i>Panel Preview</h3>
        <span id="panel-count-label">0 parts</span>
      </div>
      <div class="tab-bar results-tabs">
        <button class="tab active" type="button" id="results-parts-tab">
          <i class="fa-solid fa-table-cells" aria-hidden="true"></i>
          <span>Parts</span>
        </button>
        <button class="tab" type="button" id="results-nesting-tab">
          <i class="fa-solid fa-object-group" aria-hidden="true"></i>
          <span>Nesting</span>
        </button>
      </div>
      <div id="panel-list-view">
        <div id="panel-list"></div>
      </div>
      <div id="nesting-view" class="hidden"></div>
    </aside>
  </div>
  <div id="project-tab-menu" class="project-context-menu hidden" aria-hidden="true">
    <button class="project-context-btn" type="button" data-project-action="duplicate">
      <i class="fa-solid fa-copy" aria-hidden="true"></i>
      <span>Duplicate</span>
    </button>
    <button class="project-context-btn" type="button" data-project-action="rename">
      <i class="fa-solid fa-pen" aria-hidden="true"></i>
      <span>Rename</span>
    </button>
    <button class="project-context-btn" type="button" data-project-action="delete">
      <i class="fa-solid fa-trash" aria-hidden="true"></i>
      <span>Delete</span>
    </button>
  </div>
  <div id="sheet-zoom-modal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="sheet-zoom-title">
      <div class="modal-head">
        <div>
          <h4 id="sheet-zoom-title">Sheet Review</h4>
          <p id="sheet-zoom-meta"></p>
        </div>
        <button class="modal-close" id="sheet-zoom-close" type="button" aria-label="Close sheet review">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body" id="sheet-zoom-body"></div>
    </div>
  </div>
  <script type="module" src="js/main.js?v=20260720b"></script>
</body>
</html>
